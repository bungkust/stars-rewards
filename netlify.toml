[build]
  # Build settings for React SPA
  publish = "dist"
  command = "npm run build"

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Temporary redirect for reset-password debugging
# Redirect reset-password to login page until SPA routing works
[[redirects]]
  from = "/reset-password"
  to = "/login"
  status = 302

[build.environment]
  NODE_VERSION = "18"