[build]
  # Build settings for Netlify
  publish = "docs"
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms-and-conditions"
  to = "/terms.html"
  status = 200

# SPA fallback for any other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
